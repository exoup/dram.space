<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <style>
    .f {
      fill: none;
      stroke: #211608;
      stroke-width: .8;
      stroke-linecap: round;
      stroke-linejoin: round;
      vector-effect: non-scaling-stroke;
    }
    .filled { fill: #211608; stroke: none; }
    @media (prefers-color-scheme: dark) {
      .f       { stroke: #EBE1CE; }
      .filled  { fill: #EBE1CE; }
    }
  </style>

  <g transform="translate(-5 -5) scale(1.1)">
    <path transform="rotate(20 15 20)" class="f filled" d="
      M 36 24
      C 32 18, 16 22, 14 40
      C 12 55, 20 70, 30 73
      C 38 75, 42 68, 41 54
      C 40 40, 40 30, 36 24
      Z"/>

    <path transform="rotate(-15 90 15)" class="f filled" d="
      M 64 24
      C 68 18, 84 22, 86 40
      C 88 55, 80 70, 70 73
      C 62 75, 58 68, 59 54
      C 60 40, 60 30, 64 24
      Z
    "/>

    <ellipse class="f" cx="50" cy="46" rx="21" ry="23" />
    <ellipse class="f" cx="50" cy="62" rx="10" ry="7"/>
    <ellipse class="filled" cx="50" cy="57" rx="5.5" ry="3.75"/>
    <circle class="filled" cx="40" cy="42" r="3.5"/>
    <circle class="filled" cx="60" cy="42" r="3.5"/>
  </g>
</svg>
